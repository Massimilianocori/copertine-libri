name: Deploy sito su GitHub Pages

# Pubblica automaticamente index.html su GitHub Pages a ogni push.
# Una volta abilitato Pages (Settings → Pages → Source: "GitHub Actions"),
# il sito sarà online a: https://massimilianocori.github.io/copertine-libri/

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Deploy solo da main; le run non si annullano a vicenda (evita i "cancelled").
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepara la cartella del sito (solo i file pubblici)
        run: |
          mkdir -p _site
          cp index.html _site/
          # eventuali asset futuri (immagini, favicon, ecc.) vanno copiati qui
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
