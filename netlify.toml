# Configurazione Netlify — sito statico a file singolo (index.html).
# Deploy: collega il repo su app.netlify.com oppure trascina la cartella
# su https://app.netlify.com/drop (nessuna build necessaria).

[build]
  publish = "."
  command = ""

# index.html viene servito automaticamente alla radice del dominio.

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
